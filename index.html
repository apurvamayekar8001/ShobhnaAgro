<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobhna Agro Bill Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Shobhna Agro Bill Generator</h1>
    </header>
    <main>
        <form id="billForm">
            <label for="customerName">Customer Name:</label>
            <input type="text" id="customerName" required>
            <label for="items">Items (comma separated):</label>
            <input type="text" id="items" required>
            <label for="amount">Total Amount:</label>
            <input type="number" id="amount" required>
            <button type="submit">Generate Bill</button>
        </form>
        <div id="billPreview"></div>
    </main>
    <footer>
        <p>&copy; 2026 Shobhna Agro. All rights reserved.</p>
    </footer>
</body>
</html>
